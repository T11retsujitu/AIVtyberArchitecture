name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # 不変条件 #3/#4 の土台：契約・スキーマが型として通り、決定論/整合テストが緑であること
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
